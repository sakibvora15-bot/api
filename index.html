<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
  </head>
  <body>
    <nav>
      <div class="logo">CURRENCY</div>
      <ul>
        <li><a href="/">home</a></li>
        <li><a href="about">about</a></li>
        <li><a href="contact">contact</a></li>
      </ul>
    </nav>

    <div class="container">
      <h1>CHOOSE A CURRENCY</h1>

      <label for="country">Choose a currency:</label>
      <select name="country" id="country">
        <option value="USD">🇺🇸 USA (USD)</option>
        <option value="INR">🇮🇳 India (INR)</option>
        <option value="EUR">🇪🇺 Euro (EUR)</option>
        <option value="GBP">🇬🇧 UK (GBP)</option>
        <option value="AED">🇦🇪 UAE (AED)</option>
      </select>

      <br /><br />

      <label for="quantity">Choose a quantity:</label>
      <input type="number" name="quantity" id="quantity" min="1" placeholder="Enter amount" />

      <button class="btn">Submit</button>

      <div class="output">
        <table border="1">
          <caption>Conversion Result</caption>
          <thead>
            <tr>
              <th>From</th>
              <th>Amount</th>
              <th>To INR</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <footer>Copyright &copy; All Reserved by Sakib</footer>
    <script src="my.js"></script>
  </body>
</html>
