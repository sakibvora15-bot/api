<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Currency Converter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="logo">CURRENCY</div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>

    <div class="container page-container">
      <h1>Contact Me</h1>
      <p class="page-subtitle">Have a question or suggestion? Feel free to reach out!</p>

      <div class="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="Enter your name" />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
        </div>
        <button class="btn" onclick="sendMessage()">Send Message →</button>
        <p id="form-status" style="margin-top:12px; color:#008b8b; font-weight:500;"></p>
      </div>

      <div class="contact-info">
        <div class="contact-item">
          <span class="contact-icon">📧</span>
          <span>sakib@example.com</span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">🐙</span>
          <a href="https://github.com/sakibvora15-bot" target="_blank">github.com/sakibvora15-bot</a>
        </div>
        <div class="contact-item">
          <span class="contact-icon">📍</span>
          <span>India</span>
        </div>
      </div>
    </div>

    <footer>Copyright &copy; All Rights Reserved by Sakib</footer>
    <script>
      function sendMessage() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;
        const status = document.getElementById('form-status');

        if (!name || !email || !message) {
          status.style.color = 'red';
          status.textContent = 'Please fill in all fields.';
          return;
        }

        status.style.color = '#008b8b';
        status.textContent = `✅ Thanks ${name}! Your message has been received.`;
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
        document.getElementById('message').value = '';
      }
    </script>
  </body>
</html>
